server:
  port: 8093

spring:
  datasource:
    url: jdbc:postgresql://candidate-postgres:5432/candidate
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: candidate
        show_sql: true
        format_sql: true
        highlight_sql: true
      org.hibernate.envers:
        autoRegisterListeners: true
        audit_table_suffix: _history
        default_schema: candidate_history
        store_data_at_delete: true
        revision_field_name: revision
        revision_type_field_name: revision_type
        revision_sequence_name: candidate_history.revinfo_seq
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP-SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        retries: 10
        retry.backoff.ms: 1000
    consumer:
      group-id: candidate-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: false

otel:
  sdk:
    disabled: true