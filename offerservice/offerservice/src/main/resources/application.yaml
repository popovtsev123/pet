server:
  port: 8095

spring:
  application:
    name: offer-service
  data:
    mongodb:
      host: ${MONGO_HOST:mongodb}
      port: 27017
      database: offerdb
      username: ${MONGO_USER:mongo}
      password: ${MONGO_PASSWORD:mongo}
      authentication-database: admin

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: offer-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "ru.offer.calculationservice.consumer.CalculationCompletedEvent:ru.pet.offerservice.dto.CalculationCompletedEvent"

logging:
  level:
    ru.offer: DEBUG