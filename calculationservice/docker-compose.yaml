services:
  calculation-service:
    build:
      context: ./
      network: host
    ports:
      - "8094:8094"
    environment:
      SPRING_REDIS_HOST: redis_container
      SPRING_KAFKA_BOOTSTRAP-SERVERS: kafka:9092
    networks:
      - pet_shared-network

networks:
  pet_shared-network:
    external: true
    name: pet_shared-network